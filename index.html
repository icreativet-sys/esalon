<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESALON</title>

<style>
body { margin:0; font-family:-apple-system,sans-serif; background:#f7f7f7; }

.nav {
  position:fixed; top:0; width:100%;
  background:white; border-bottom:1px solid #eee;
}

.nav-inner {
  max-width:1200px; margin:auto; height:60px;
  display:flex; justify-content:space-between; align-items:center;
  padding:0 20px;
}

.nav-right a { margin-left:20px; text-decoration:none; color:#333; }

.hero {
  margin-top:60px; height:90vh;
  background:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  color:white;
}

.btn {
  padding:12px 24px; border:1px solid white;
  color:white; text-decoration:none;
}

.grid {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:20px; padding:40px; background:white;
}

.card {
  padding:40px; border:1px solid #eee; text-align:center;
}
</style>
</head>

<body>

<div class="nav">
  <div class="nav-inner">
    <div>ESALON</div>

    <div class="nav-right">
      <a href="index.html">Home</a>
      <a href="booking.html">Booking</a>
      <a href="login.html">Login</a>
      <a id="adminBtn" href="admin.html" style="display:none;">Control Panel</a>
    </div>
  </div>
</div>

<div class="hero">
  <h1 id="heroTitle">ESALON</h1>
  <p id="heroDesc">Premium Hair System</p>
  <a href="booking.html" class="btn">Book Now</a>
</div>

<div class="grid">
  <div class="card">Booking</div>
  <div class="card">Academy</div>
  <div class="card">Shop</div>
  <div class="card">Franchise</div>
</div>

<script>
if(localStorage.getItem("admin")==="true"){
  document.getElementById("adminBtn").style.display="inline";
}

document.getElementById("heroTitle").innerText =
  localStorage.getItem("title") || "ESALON";

document.getElementById("heroDesc").innerText =
  localStorage.getItem("desc") || "Premium Hair System";
</script>

</body>
</html>
