<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESALON</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #000;
    }
    .hero {
      min-height: 100vh;;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 64px;
      letter-spacing: -2px;
    }
    p {
      color: #666;
    }
    button {
      margin-top: 20px;
      padding: 12px 24px;
      border: 1px solid black;
      background: transparent;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: black;
      color: white;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 60px 20px;
    }
    .card {
      border: 1px solid #000;
  padding: 40px;
  text-align: center;
  transition: 0.3s;
  display: block;
    }
    .card:hover {
      background: black;
      color: white;
    }
    @media(max-width:768px){
      .grid {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <h1>ESALON</h1>
    <p>Premium Hair System</p>
    <button>Book Now</button>
  </section>

  <section class="grid">
  <a href="booking.html" class="card">Booking</a>
  <a href="academy.html" class="card">Academy</a>
  <a href="shop.html" class="card">Shop</a>
  <a href="franchise.html" class="card">Franchise</a>
</section>

</body>
</html>
