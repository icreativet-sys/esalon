<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESALON</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f7f7f7;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 40px;
  background: white;
  border-bottom: 1px solid #eee;
  z-index: 1000;
}

.nav-left {
  font-weight: bold;
}

.nav-right a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

/* HERO */
.hero {
  margin-top: 60px;
  height: 90vh;
  background: url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
}

.hero h1 {
  font-size: 64px;
  margin: 0;
}

.btn {
  margin-top: 20px;
  padding: 14px 28px;
  border: 1px solid white;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.btn:hover {
  background: white;
  color: black;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 20px;
  padding: 60px 20px;
  background: white;
}

.card {
  border: 1px solid #eee;
  padding: 40px;
  text-align: center;
  text-decoration: none;
  color: black;
  transition: 0.3s;
}

.card:hover {
  background: black;
  color: white;
  transform: translateY(-5px);
}

/* MOBILE */
@media(max-width:768px){
  .grid {
    grid-template-columns: 1fr;
  }
  .hero h1 {
    font-size: 40px;
  }
}
</style>
</head>

<body>

<div class="nav">
  <div class="nav-left">ESALON</div>
  <div class="nav-right">
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
    <a href="academy.html">Academy</a>
    <a href="shop.html">Shop</a>
    <a href="franchise.html">Franchise</a>
  </div>
</div>

<div class="hero">
  <h1>ESALON</h1>
  <p>Premium Hair System</p>
  <a href="booking.html" class="btn">Book Now</a>
</div>

<div class="grid">
  <a href="booking.html" class="card">Booking</a>
  <a href="academy.html" class="card">Academy</a>
  <a href="shop.html" class="card">Shop</a>
  <a href="franchise.html" class="card">Franchise</a>
</div>

</body>
</html>
