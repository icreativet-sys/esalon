<!DOCTYPE html>
<html>
<head>
<title>ESALON</title>

<style>
body {margin:0;font-family:sans-serif;}

.nav {position:fixed;width:100%;background:white;border-bottom:1px solid #eee;}

.nav-inner {
  max-width:1200px;margin:auto;height:60px;
  display:flex;justify-content:space-between;align-items:center;padding:0 20px;
}

.nav a {margin-left:20px;text-decoration:none;color:black;}

.hero {
  margin-top:60px;height:90vh;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;padding:40px;background:white;
}

.card {
  padding:40px;border:1px solid #eee;text-align:center;
  text-decoration:none;color:black;
}
</style>
</head>

<body>

<div class="nav">
  <div class="nav-inner">
    <div>ESALON</div>

    <div>
      <a href="index.html">Home</a>
      <a href="booking.html">Booking</a>
      <a href="login.html">Login</a>
      <a id="adminBtn" href="admin.html" style="display:none;">Control Panel</a>
    </div>
  </div>
</div>

<div class="hero">
  <h1 id="heroTitle">ESALON</h1>
  <p id="heroDesc">Premium Hair System</p>
</div>

<div class="grid">
  <a href="booking.html" class="card">Booking</a>
  <a href="academy.html" class="card">Academy</a>
  <a href="shop.html" class="card">Shop</a>
  <a href="franchise.html" class="card">Franchise</a>
</div>

<script>
if(localStorage.getItem("admin")==="true"){
  document.getElementById("adminBtn").style.display="inline";
}

document.getElementById("heroTitle").innerText =
  localStorage.getItem("title") || "ESALON";

document.getElementById("heroDesc").innerText =
  localStorage.getItem("desc") || "Premium Hair System";
</script>

</body>
</html>
