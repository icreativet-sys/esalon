<!DOCTYPE html>
<html>
<head>
<title>Login - ESALON</title>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#111;color:white;font-family:-apple-system,sans-serif;}
.box{background:#1a1a1a;padding:40px;width:360px;border:1px solid #333;}
.box h2{margin-bottom:25px;font-size:24px;}
.tabs{display:flex;margin-bottom:25px;border-bottom:1px solid #333;}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;color:#777;background:none;border:none;font-size:14px;border-bottom:2px solid transparent;transition:0.3s;}
.tab.active{color:white;border-bottom:2px solid white;}
label{display:block;margin-bottom:5px;color:#aaa;font-size:13px;}
input{width:100%;padding:12px;margin-bottom:15px;background:#111;border:1px solid #333;color:white;font-size:14px;outline:none;}
input:focus{border-color:#fff;}
button.main-btn{width:100%;padding:13px;background:white;color:black;border:none;cursor:pointer;font-size:15px;font-weight:600;}
.msg{margin-top:12px;font-size:13px;text-align:center;}
.msg.error{color:#ff6b6b;}
.msg.success{color:#6bffb8;}
.home-link{display:block;text-align:center;margin-top:15px;color:#666;font-size:13px;text-decoration:none;}
</style>
</head>
<body>
<div class="box">
  <h2>ESALON</h2>
  <div class="tabs">
    <button class="tab active" id="loginTab" onclick="showTab('login')">Нэвтрэх</button>
    <button class="tab" id="registerTab" onclick="showTab('register')">Бүртгүүлэх</button>
  </div>
  <div id="loginForm">
    <label>И-мэйл</label>
    <input id="loginEmail" type="email" placeholder="email@example.com">
    <label>Нууц үг</label>
    <input id="loginPass" type="password" placeholder="Нууц үг">
    <button class="main-btn" onclick="login()">Нэвтрэх</button>
    <div id="loginMsg" class="msg"></div>
  </div>
  <div id="registerForm" style="display:none;">
    <label>И-мэйл</label>
    <input id="regEmail" type="email" placeholder="email@example.com">
    <label>Нууц үг</label>
    <input id="regPass" type="password" placeholder="Нууц үг">
    <label>Нууц үг давтах</label>
    <input id="regPass2" type="password" placeholder="Нууц үг давтах">
    <button class="main-btn" onclick="register()">Бүртгүүлэх</button>
    <div id="registerMsg" class="msg"></div>
  </div>
  <a href="index.html" class="home-link">Нүүр хуудас руу буцах</a>
</div>
<script>
function showTab(t){document.getElementById('loginForm').style.display=t==='login'?'block':'none';document.getElementById('registerForm').style.display=t==='register'?'block':'none';document.getElementById('loginTab').classList.toggle('active',t==='login');document.getElementById('registerTab').classList.toggle('active',t==='register');}
function login(){var e=document.getElementById('loginEmail').value.trim();var p=document.getElementById('loginPass').value;var m=document.getElementById('loginMsg');if(!e||!p){m.className='msg error';m.textContent='И-мэйл болон нууц үгээ оруулна уу';return;}if(e==='admin@esalon.mn'&&p==='123456'){localStorage.setItem('role','admin');localStorage.setItem('admin','true');localStorage.setItem('currentUser',e);window.location='admin.html';return;}var users=JSON.parse(localStorage.getItem('users')||'[]');var user=users.find(function(u){return u.email===e&&u.pass===p;});if(user){localStorage.setItem('role','user');localStorage.setItem('admin','false');localStorage.setItem('currentUser',e);window.location='booking.html';}else{m.className='msg error';m.textContent='И-мэйл эсвэл нууц үг буруу байна';} }
function register(){var e=document.getElementById('regEmail').value.trim();var p=document.getElementById('regPass').value;var p2=document.getElementById('regPass2').value;var m=document.getElementById('registerMsg');if(!e||!p){m.className='msg error';m.textContent='Бүх талбарыг бөглөнө үү';return;}if(p!==p2){m.className='msg error';m.textContent='Нууц үг таарахгүй байна';return;}if(p.length<6){m.className='msg error';m.textContent='Нууц үг дор хаяж 6 тэмдэгт байх ёстой';return;}var users=JSON.parse(localStorage.getItem('users')||'[]');if(users.find(function(u){return u.email===e;})){m.className='msg error';m.textContent='Энэ и-мэйл бүртгэлтэй байна';return;}users.push({email:e,pass:p});localStorage.setItem('users',JSON.stringify(users));m.className='msg success';m.textContent='Амжилттай бүртгэгдлээ - Нэвтэрч орно уу';setTimeout(function(){showTab('login');},1500);}
</script>
</body>
</html>
