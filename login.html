<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
display:flex;justify-content:center;align-items:center;
height:100vh;background:#111;color:white;font-family:sans-serif;
}

.box{
background:#1a1a1a;
padding:40px;width:300px;
}

input{
width:100%;
padding:12px;margin-bottom:10px;
background:#111;border:1px solid #333;color:white;
}

button{
width:100%;
padding:12px;background:white;color:black;border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>
function login(){
if(email.value==="admin@esalon.mn" && password.value==="123456"){
localStorage.setItem("admin","true");
window.location="admin.html";
}else{
alert("Wrong");
}
}
</script>

</body>
</html>
