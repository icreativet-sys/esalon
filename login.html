<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
display:flex;justify-content:center;align-items:center;
height:100vh;background:#111;color:white;font-family:sans-serif;
}

.box{
background:#1a1a1a;
padding:40px;width:320px;
}

input{
width:100%;
padding:12px;margin-bottom:10px;
background:#111;border:1px solid #333;color:white;
}

button{
width:100%;
padding:12px;background:white;color:black;border:none;
cursor:pointer;margin-top:5px;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

</div>

<script>

// LOGIN
function login(){
  const email = emailInput.value;
  const pass = passwordInput.value;

  // ADMIN
  if(email==="admin@esalon.mn" && pass==="123456"){
    localStorage.setItem("role","admin");
    window.location="admin.html";
    return;
  }

  // CUSTOMER
  const users = JSON.parse(localStorage.getItem("users") || "[]");

  const user = users.find(u=>u.email===email && u.pass===pass);

  if(user){
    localStorage.setItem("role","user");
    localStorage.setItem("currentUser", email);
    window.location="booking.html";
  } else {
    alert("Буруу мэдээлэл ❌");
  }
}

// REGISTER
function register(){
  const email = emailInput.value;
  const pass = passwordInput.value;

  if(!email || !pass){
    alert("Мэдээллээ бөглөнө үү");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users") || "[]");

  users.push({email:email, pass:pass});

  localStorage.setItem("users", JSON.stringify(users));

  alert("Амжилттай бүртгэгдлээ ✔");
}

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

</script>

</body>
</html>
