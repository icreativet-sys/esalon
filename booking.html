<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#111;color:white;}

.nav{position:fixed;top:0;width:100%;background:black;}
.nav-inner{display:flex;justify-content:space-between;padding:20px;}
.nav a{color:#ccc;margin-left:20px;text-decoration:none;}
.nav a:hover{color:white;}

.container{
margin-top:80px;
display:grid;
grid-template-columns:1fr 1fr;
min-height:100vh;
}

.left{
background:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover;
}

.right{
padding:60px;
background:#1a1a1a;
}

input,select{
width:100%;
padding:12px;
margin-bottom:15px;
background:#111;
border:1px solid #333;
color:white;
}

button{
padding:12px;
background:white;
color:black;
border:none;
cursor:pointer;
transition:0.3s;
}

button:hover{background:#ddd;}
</style>
</head>

<body>

<div class="nav">
<div class="nav-inner">
<div>ESALON</div>
<div>
<a href="index.html">Home</a>
<a href="login.html">Login</a>
<a id="adminBtn" href="admin.html" style="display:none;">Admin</a>
</div>
</div>
</div>

<div class="container">

<div class="left"></div>

<div class="right">
<h2>Book Appointment</h2>

<form onsubmit="alert('Амжилттай захиалга!');return false;">
<input placeholder="Нэр">
<input placeholder="Утас">
<select>
<option>Haircut</option>
<option>Color</option>
</select>
<input type="datetime-local">
<button>Book Now</button>
</form>

</div>
</div>

<script>
if(localStorage.getItem("admin")==="true"){
adminBtn.style.display="inline";
}
</script>

</body>
</html>
