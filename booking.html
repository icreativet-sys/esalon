<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Цаг захиалах - ESALON</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,sans-serif;background:#111;color:white;}
.nav{position:fixed;top:0;width:100%;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);z-index:100;border-bottom:1px solid #333;}
.nav-inner{max-width:1200px;margin:auto;height:60px;display:flex;justify-content:space-between;align-items:center;padding:0 20px;}
.logo{font-weight:bold;font-size:18px;}
.nav a{color:#ccc;margin-left:20px;text-decoration:none;font-size:14px;transition:0.3s;}
.nav a:hover{color:white;}
.nav-user{font-size:13px;color:#888;margin-left:20px;}
.container{margin-top:60px;display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 60px);}
.left{background:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover;position:relative;}
.left::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,0.5);}
.right{padding:40px;background:#1a1a1a;overflow:auto;}
h2{margin-bottom:15px;font-size:20px;}
h3{margin-bottom:10px;font-size:15px;color:#ccc;}
select,input{width:100%;padding:12px;margin-bottom:12px;background:#111;border:1px solid #333;color:white;font-size:14px;outline:none;}
select:focus,input:focus{border-color:#fff;}
iframe{width:100%;height:280px;border:none;margin-bottom:15px;border-radius:4px;}
button[type="submit"]{width:100%;padding:13px;background:white;color:black;border:none;cursor:pointer;font-size:15px;font-weight:600;transition:0.3s;margin-top:5px;}
button[type="submit"]:hover{background:#ddd;}
.success-box{background:#1a3a1a;border:1px solid #2a5a2a;padding:20px;margin-top:15px;display:none;}
.success-box h3{color:#6bffb8;margin-bottom:10px;}
.success-box p{color:#ccc;font-size:14px;line-height:1.6;}
.divider{border:none;border-top:1px solid #333;margin:20px 0;}
.info-label{font-size:12px;color:#888;margin-bottom:4px;}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-inner">
    <div class="logo">ESALON</div>
    <div>
      <a href="index.html">Нүүр</a>
      <span class="nav-user" id="navUser"></span>
      <a href="login.html" id="loginLink">Нэвтрэх</a>
      <a id="adminBtn" href="admin.html" style="display:none;">Admin</a>
      <a href="#" id="logoutLink" style="display:none;" onclick="logout()">Гарах</a>
    </div>
  </div>
</div>

<div class="container">
  <div class="left"></div>
  <div class="right">
    <h2>Цаг захиалах</h2>

    <div class="info-label">Салбар сонгох</div>
    <select id="branchSelect">
      <option value="ulaan">Улсын их дэлгүүр</option>
      <option value="zaisan">Зайсан</option>
    </select>

    <iframe id="calendarFrame" src="https://calendar.google.com/calendar/embed?src=a8b02f94bd18a3bd68059b059e52f077c0b81a6b7c9d925128b1d2bb97d434b8@group.calendar.google.com"></iframe>

    <hr class="divider">
    <h3>Мэдээлэл оруулах</h3>

    <form onsubmit="submitBooking(event)">
      <div class="info-label">Нэр</div>
      <input id="nameInput" placeholder="Таны нэр" required>

      <div class="info-label">Утасны дугаар</div>
      <input id="phoneInput" placeholder="99xxxxxx" required>

      <div class="info-label">Үйлчилгээ</div>
      <select id="service">
        <option>Haircut - Үс засалт</option>
        <option>Color - Үс будалт</option>
        <option>Treatment - Эмчилгээ</option>
        <option>Perm - Долгион</option>
        <option>Styling - Засалт</option>
      </select>

      <div class="info-label">Цаг огноо</div>
      <input id="timeInput" type="datetime-local" required>

      <button type="submit">Захиалах</button>
    </form>

    <div class="success-box" id="successBox">
      <h3>Захиалга амжилттай! ✔</h3>
      <p id="successDetails"></p>
    </div>
  </div>
</div>

<script>
// Auth check
var role = localStorage.getItem('role');
var currentUser = localStorage.getItem('currentUser');
var isAdmin = role === 'admin';

if(isAdmin){
  document.getElementById('adminBtn').style.display='inline';
}
if(role){
  document.getElementById('loginLink').style.display='none';
  document.getElementById('logoutLink').style.display='inline';
  if(currentUser){
    document.getElementById('navUser').textContent = currentUser + ' |';
  }
}
if(currentUser){
  document.getElementById('nameInput').value = currentUser.split('@')[0] || '';
}

// Calendar switch
document.getElementById('branchSelect').addEventListener('change', function(){
  var src = this.value === 'ulaan'
    ? 'https://calendar.google.com/calendar/embed?src=a8b02f94bd18a3bd68059b059e52f077c0b81a6b7c9d925128b1d2bb97d434b8@group.calendar.google.com'
    : 'https://calendar.google.com/calendar/embed?src=4d105fb95fdd308e777bef0fee82f3d57b25f04dfaef0737a0d62f587815ef9d@group.calendar.google.com';
  document.getElementById('calendarFrame').src = src;
});

// Submit booking
function submitBooking(e){
  e.preventDefault();
  var name = document.getElementById('nameInput').value;
  var phone = document.getElementById('phoneInput').value;
  var service = document.getElementById('service').value;
  var time = document.getElementById('timeInput').value;
  var branch = document.getElementById('branchSelect').options[document.getElementById('branchSelect').selectedIndex].text;

  var booking = {
    name: name,
    phone: phone,
    service: service,
    time: time,
    branch: branch,
    status: 'pending',
    createdAt: new Date().toISOString(),
    user: currentUser || 'guest'
  };

  var bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
  bookings.push(booking);
  localStorage.setItem('bookings', JSON.stringify(bookings));

  var successBox = document.getElementById('successBox');
  var details = document.getElementById('successDetails');
  details.innerHTML = 'Нэр: ' + name + '<br>Утас: ' + phone + '<br>Үйлчилгээ: ' + service + '<br>Цаг: ' + new Date(time).toLocaleString('mn-MN') + '<br>Салбар: ' + branch;
  successBox.style.display = 'block';

  e.target.reset();
  if(currentUser) document.getElementById('nameInput').value = currentUser.split('@')[0] || '';
  successBox.scrollIntoView({behavior:'smooth'});
}

function logout(){
  localStorage.removeItem('role');
  localStorage.removeItem('admin');
  localStorage.removeItem('currentUser');
  window.location = 'login.html';
}
</script>
</body>
