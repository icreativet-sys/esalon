<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking | ESALON</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f5f5f5;
}

/* NAVBAR */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: white;
  border-bottom: 1px solid #eee;
  z-index: 1000;
}

.nav-inner {
  max-width: 1200px;
  margin: auto;
  height: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

.nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

/* LAYOUT */
.container {
  margin-top: 60px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}

/* LEFT IMAGE */
.left {
  background: url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover no-repeat;
}

/* RIGHT SIDE */
.right {
  background: white;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  margin-bottom: 10px;
}

h3 {
  margin-top: 25px;
  margin-bottom: 10px;
  font-size: 16px;
  color: #555;
}

/* CALENDAR */
iframe {
  border-radius: 10px;
  border: 1px solid #eee;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
}

input, select {
  margin-bottom: 15px;
  padding: 14px;
  border: 1px solid #ddd;
  background: #fafafa;
  border-radius: 8px;
  font-size: 14px;
}

/* BUTTON */
button {
  padding: 14px;
  border: none;
  background: black;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
  font-size: 14px;
}

button:hover {
  opacity: 0.8;
}

/* MOBILE */
@media(max-width:768px){
  .container {
    grid-template-columns: 1fr;
  }

  .left {
    height: 250px;
  }

  .right {
    padding: 30px;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">
    <div class="logo">ESALON</div>

    <div>
      <a href="index.html">Home</a>
      <a href="booking.html">Booking</a>
      <a href="academy.html">Academy</a>
      <a href="shop.html">Shop</a>
      <a href="franchise.html">Franchise</a>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <!-- IMAGE -->
  <div class="left"></div>

  <!-- RIGHT -->
  <div class="right">

    <h1>Book Appointment</h1>

    <!-- STEP 1 -->
    <h3>Select Available Time</h3>

    <iframe 
      src="https://calendar.google.com/calendar/embed?src=a8b02f94bd18a3bd68059b059e52f077c0b81a6b7c9d925128b1d2bb97d434b8@group.calendar.google.com"
      width="100%" 
      height="300">
    </iframe>

    <!-- STEP 2 -->
    <h3>Enter Your Info</h3>

    <form onsubmit="alert('Захиалга амжилттай! Бид удахгүй холбогдоно.'); return false;">
      <input type="text" placeholder="Your Name" required>
      <input type="tel" placeholder="Phone Number" required>

      <select required>
        <option value="">Select Service</option>
        <option>Haircut</option>
        <option>Hair Color</option>
        <option>Perm</option>
      </select>

      <input type="datetime-local" required>

      <button type="submit">Confirm Booking</button>
    </form>

  </div>

</div>

</body>
</html>
