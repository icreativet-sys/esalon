<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f7f7f7;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 40px;
  background: white;
  border-bottom: 1px solid #eee;
  z-index: 1000;
}

.nav-left {
  font-weight: bold;
}

.nav-right a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

/* LAYOUT */
.container {
  margin-top: 60px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}

.left {
  background: url('https://i.pinimg.com/736x/de/f2/30/def23092180c49688f0d51bb50e86d7e.jpg') center/cover no-repeat;
}

.right {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px;
  background: white;
}

h1 {
  margin-bottom: 20px;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
}

input, select {
  margin-bottom: 15px;
  padding: 12px;
  border: 1px solid #ddd;
  background: #fafafa;
}

button {
  padding: 14px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

/* MOBILE */
@media(max-width:768px){
  .container {
    grid-template-columns: 1fr;
  }
  .left {
    height: 250px;
  }
}
</style>
</head>

<body>

<div class="nav">
  <div class="nav-left">ESALON</div>
  <div class="nav-right">
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
    <a href="academy.html">Academy</a>
    <a href="shop.html">Shop</a>
    <a href="franchise.html">Franchise</a>
  </div>
</div>

<div class="container">

  <div class="left"></div>

  <div class="right">
    <h1>Book Appointment</h1>

    <form onsubmit="alert('Амжилттай захиалга илгээлээ!'); return false;">
      <input type="text" placeholder="Your Name" required>
      <input type="tel" placeholder="Phone Number" required>

      <select>
        <option>Haircut</option>
        <option>Hair Color</option>
        <option>Perm</option>
      </select>

      <input type="datetime-local" required>

      <button type="submit">Book Now</button>
    </form>
  </div>

</div>

</body>
</html>
